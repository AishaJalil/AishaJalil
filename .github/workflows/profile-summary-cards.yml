name: Profile Summary Cards

on:
  schedule:
    - cron: "0 0 * * *" # every day
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: vn7n24fzkq/github-profile-summary-cards@v0.6.0
        with:
           USERNAME: ${{ github.repository_owner }}
